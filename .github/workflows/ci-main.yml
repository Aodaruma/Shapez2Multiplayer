name: ci-main

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\tests\Shapez2Multiplayer.Tests\Shapez2Multiplayer.Tests.csproj

      - name: Build (CI mode)
        run: dotnet build .\Shapez2Multiplayer.csproj -c Release --no-restore -p:UseGameAssemblies=false

      - name: Test
        run: dotnet test .\tests\Shapez2Multiplayer.Tests\Shapez2Multiplayer.Tests.csproj -c Release --no-restore -p:UseGameAssemblies=false --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .\tests\Shapez2Multiplayer.Tests\TestResults\test-results.trx
          if-no-files-found: ignore
